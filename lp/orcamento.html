<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Orçamento</title>
  <style>
    :root {
      --gold: #C4B470; --gold-2: #A89858; --gold-light: #FFFBEB;
      --dark: #0D1117; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
      --gray-500: #6B7280; --gray-700: #374151; --gray-900: #111827;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #F3F4F6; padding: 32px 24px; }
    .wrap { max-width: 680px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 32px; }
    .logo-icon { width: 48px; height: 48px; background: var(--dark); border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 12px; overflow: hidden; padding: 8px; }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    h1 { font-size: 24px; font-weight: 900; color: var(--gray-900); margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--gray-500); }

    .card { background: white; border-radius: 14px; padding: 28px; margin-bottom: 16px; border: 1px solid var(--gray-200); }
    .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid var(--gold-light); }

    label { display: block; font-size: 12px; font-weight: 700; color: var(--gray-700); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    input, select, textarea {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-200); border-radius: 8px;
      font-size: 14px; color: var(--gray-900); background: white; outline: none;
      transition: border-color 0.15s; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--gold-2); box-shadow: 0 0 0 3px rgba(196,180,112,0.15); }
    input[readonly] { background: var(--gray-100); color: var(--gray-500); cursor: not-allowed; }
    textarea { resize: vertical; min-height: 72px; }
    .field { margin-bottom: 18px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 500px) { .row2 { grid-template-columns: 1fr; } }

    /* Tabela de itens */
    .itens-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    .itens-table th {
      font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--gray-500); padding: 0 8px 10px; text-align: left;
    }
    .itens-table th:last-child { width: 32px; }
    .item-row td { padding: 4px 4px; vertical-align: middle; }
    .item-row td:last-child { padding-left: 8px; }
    .item-row input {
      padding: 9px 10px; font-size: 13px; border-radius: 6px;
    }
    .item-row .td-produto { width: 40%; }
    .item-row .td-qtd    { width: 12%; }
    .item-row .td-unit   { width: 20%; }
    .item-row .td-total  { width: 22%; }
    .item-row .td-del    { width: 6%; }
    .input-total { background: var(--gray-100); color: var(--gray-700); font-weight: 700; cursor: default; }

    .btn-del {
      width: 28px; height: 28px; border-radius: 6px; border: none;
      background: #FEE2E2; color: #DC2626; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    .btn-del:hover { background: #FECACA; }

    .btn-add {
      width: 100%; padding: 10px; background: var(--gray-100); color: var(--gray-700);
      border: 1.5px dashed var(--gray-200); border-radius: 8px; font-size: 13px;
      font-weight: 700; cursor: pointer; transition: all 0.15s; margin-bottom: 16px;
    }
    .btn-add:hover { background: var(--gold-light); border-color: var(--gold-2); color: var(--gold-2); }

    .total-geral { display: flex; justify-content: flex-end; align-items: center; gap: 12px; padding: 12px 0 4px; border-top: 2px solid var(--gray-200); }
    .total-label { font-size: 13px; font-weight: 700; color: var(--gray-700); text-transform: uppercase; letter-spacing: 0.5px; }
    .total-valor { font-size: 20px; font-weight: 900; color: var(--gray-900); }

    #btn-submit {
      width: 100%; padding: 16px; background: var(--dark); color: var(--gold-2); border: none;
      border-radius: 10px; font-size: 16px; font-weight: 800; cursor: pointer;
      transition: all 0.15s; letter-spacing: 0.3px; margin-top: 8px;
      font-family: inherit; box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }
    #btn-submit:hover { background: #1a1a2e; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.22); }
    #btn-submit:active { transform: translateY(0); }
    #btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .status { display: none; padding: 14px 18px; border-radius: 8px; font-size: 13.5px; font-weight: 600; margin-top: 16px; }
    .status.ok  { background: #D1FAE5; color: #065F46; display: block; }
    .status.err { background: #FEE2E2; color: #7F1D1D; display: block; }

    .invalid { text-align: center; padding: 48px 24px; }
    .invalid-icon { font-size: 48px; margin-bottom: 16px; }
    .invalid h2 { font-size: 20px; font-weight: 900; color: var(--gray-900); margin-bottom: 8px; }
    .invalid p { font-size: 14px; color: var(--gray-500); line-height: 1.6; }

    @media (max-width: 540px) {
      body { padding: 16px 12px; }
      .wrap { max-width: 100%; }
      .card { padding: 20px 16px; margin-bottom: 12px; }
      h1 { font-size: 20px; }

      /* Tabela de itens → cards empilhados */
      .itens-table thead { display: none; }
      .itens-table, .itens-table tbody, .item-row, .item-row td { display: block; width: 100%; }
      .item-row { background: var(--gray-100); border-radius: 8px; padding: 10px; margin-bottom: 10px; position: relative; }
      .item-row td { padding: 3px 0; }
      .item-row .td-produto { width: 100%; }
      .item-row .td-qtd, .item-row .td-unit, .item-row .td-total { width: 100%; }
      .item-row .td-del { position: absolute; top: 8px; right: 8px; width: auto; }
      .item-row td::before {
        content: attr(data-label);
        display: block; font-size: 10px; font-weight: 800;
        text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-500); margin-bottom: 3px;
      }
      .item-row input { background: white; }

      .total-geral { padding: 10px 0 2px; }
      .total-valor { font-size: 18px; }
      #btn-submit { font-size: 15px; padding: 15px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo-icon"><img src="/logo.png" alt="Escalando"></div>
    <h1 id="page-title">Novo Orçamento</h1>
    <p class="subtitle" id="page-sub">Preencha os dados do orçamento solicitado</p>
  </div>

  <div id="conteudo"></div>

</div>

<script>
  const CONFIG = { webhookUrl: 'https://escalando-premoldados.vercel.app/api/orcamento' };
  const params  = new URLSearchParams(window.location.search);
  const cliente = params.get('c') || params.get('cliente');
  const cont    = document.getElementById('conteudo');

  if (!cliente) {
    cont.innerHTML = `
      <div class="card">
        <div class="invalid">
          <div class="invalid-icon">🔒</div>
          <h2>Link inválido</h2>
          <p>Use o link enviado pela Escalando Premoldados.<br>Entre em contato caso precise de ajuda.</p>
        </div>
      </div>`;
    document.getElementById('page-title').textContent = 'Acesso restrito';
    document.getElementById('page-sub').textContent = '';
  } else {
    cont.innerHTML = `
      <!-- CLIENTE -->
      <div class="card">
        <div class="section-title">Identificação</div>
        <div class="row2">
          <div class="field">
            <label>Empresa</label>
            <input type="text" value="${cliente}" readonly>
          </div>
          <div class="field">
            <label>Nome do contato *</label>
            <input type="text" name="nome" placeholder="Quem solicitou" required>
          </div>
        </div>
        <div class="row2">
          <div class="field">
            <label>Telefone *</label>
            <input type="tel" name="telefone" placeholder="(00) 00000-0000" required>
          </div>
          <div class="field">
            <label>Região de entrega</label>
            <input type="text" name="regiao" placeholder="Ex: Interior de Sergipe">
          </div>
        </div>
        <div class="field">
          <label>Canal de origem *</label>
          <select name="canal" id="canal" required>
            <option value="">Selecione...</option>
            <option>Meta Ads</option>
            <option>Google Ads</option>
            <option>GMB</option>
            <option>WhatsApp Direto</option>
            <option>Indicação</option>
            <option>Ligação</option>
            <option>Visita</option>
            <option>Site</option>
            <option value="outro">Outro</option>
          </select>
          <input type="text" name="canal_outro" id="canal_outro" placeholder="Descreva o canal..." style="display:none; margin-top:8px;">
        </div>
      </div>

      <!-- ITENS -->
      <div class="card">
        <div class="section-title">Itens do Orçamento</div>
        <table class="itens-table">
          <thead>
            <tr>
              <th>Produto</th>
              <th>Qtd</th>
              <th>Vl. Unit (R$)</th>
              <th>Total (R$)</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="itens-body"></tbody>
        </table>
        <button type="button" class="btn-add" id="btn-add">+ Adicionar item</button>
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:12px;margin-bottom:10px;">
          <label style="margin:0;font-size:12px;font-weight:700;color:var(--gray-700);text-transform:uppercase;letter-spacing:.5px;">Frete (R$)</label>
          <input type="number" id="input-frete" min="0" step="0.01" placeholder="0,00"
                 style="width:140px;margin:0;text-align:right;" oninput="recalcTotal()">
        </div>
        <div class="total-geral">
          <span class="total-label">Total geral</span>
          <span class="total-valor" id="total-geral">R$ 0,00</span>
        </div>
      </div>

      <!-- COMPLEMENTO -->
      <div class="card">
        <div class="section-title">Complemento</div>
        <div class="row2">
          <div class="field">
            <label>Prazo desejado</label>
            <input type="text" name="prazo" placeholder="Ex: 15 dias, urgente...">
          </div>
          <div class="field">
            <label>Data</label>
            <input type="date" name="data">
          </div>
        </div>
        <div class="field">
          <label>Observação</label>
          <textarea name="obs" placeholder="Detalhes adicionais, condições especiais..."></textarea>
        </div>
      </div>

      <button type="button" id="btn-submit">Registrar orçamento →</button>
      <div class="status" id="status"></div>`;

    // Define data de hoje
    document.querySelector('[name="data"]').valueAsDate = new Date();

    // Canal "Outro"
    document.getElementById('canal').addEventListener('change', function() {
      const outro = document.getElementById('canal_outro');
      outro.style.display = this.value === 'outro' ? 'block' : 'none';
      outro.required = this.value === 'outro';
      if (this.value !== 'outro') outro.value = '';
    });

    // Máscara telefone
    document.querySelector('[name="telefone"]').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '').slice(0, 11);
      if (v.length > 6) v = v.replace(/^(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
      else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
      e.target.value = v;
    });

    // ---- ITENS DINÂMICOS ----
    let itemCount = 0;

    function fmt(n) {
      return 'R$ ' + (n || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function recalcTotal() {
      let sub = 0;
      document.querySelectorAll('.item-row').forEach(row => {
        const qtd  = parseFloat(row.querySelector('.input-qtd').value)  || 0;
        const unit = parseFloat(row.querySelector('.input-unit').value) || 0;
        const t    = qtd * unit;
        row.querySelector('.input-total').value = t > 0 ? fmt(t) : '';
        sub += t;
      });
      const frete = parseFloat(document.getElementById('input-frete')?.value) || 0;
      document.getElementById('total-geral').textContent = fmt(sub + frete);
    }

    function addItem() {
      const id = ++itemCount;
      const tr = document.createElement('tr');
      tr.className = 'item-row';
      tr.dataset.id = id;
      tr.innerHTML = `
        <td class="td-produto" data-label="Produto"><input type="text" class="input-produto" placeholder="Ex: Piso sextavado 6cm"></td>
        <td class="td-qtd" data-label="Quantidade"><input type="number" class="input-qtd" min="1" placeholder="0"></td>
        <td class="td-unit" data-label="Vl. Unitário (R$)"><input type="number" class="input-unit" min="0" step="0.01" placeholder="0,00"></td>
        <td class="td-total" data-label="Total (R$)"><input type="text" class="input-total" readonly placeholder="—"></td>
        <td class="td-del"><button type="button" class="btn-del" title="Remover">×</button></td>`;
      document.getElementById('itens-body').appendChild(tr);
      tr.querySelector('.input-qtd').addEventListener('input', recalcTotal);
      tr.querySelector('.input-unit').addEventListener('input', recalcTotal);
      tr.querySelector('.btn-del').addEventListener('click', function() {
        if (document.querySelectorAll('.item-row').length > 1) {
          tr.remove(); recalcTotal();
        }
      });
      tr.querySelector('.input-produto').focus();
    }

    document.getElementById('btn-add').addEventListener('click', addItem);
    addItem(); // começa com 1 linha

    // ---- SUBMIT ----
    document.getElementById('btn-submit').addEventListener('click', async function() {
      const btn = this;
      const st  = document.getElementById('status');

      // Valida campos obrigatórios
      const nome     = document.querySelector('[name="nome"]').value.trim();
      const telefone = document.querySelector('[name="telefone"]').value.trim();
      const canalEl  = document.getElementById('canal');
      const canal    = canalEl.value === 'outro'
        ? (document.getElementById('canal_outro').value.trim() || 'Outro')
        : canalEl.value;

      if (!nome || !telefone || !canal) {
        st.className = 'status err';
        st.textContent = '❌ Preencha nome, telefone e canal de origem.';
        return;
      }

      // Coleta itens
      const itens = [];
      document.querySelectorAll('.item-row').forEach(row => {
        const produto = row.querySelector('.input-produto').value.trim();
        const qtd     = parseFloat(row.querySelector('.input-qtd').value)  || 0;
        const preco   = parseFloat(row.querySelector('.input-unit').value) || 0;
        if (produto) itens.push({ produto, qtd, preco });
      });

      st.className = 'status';
      st.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Registrando...';

      const dados = {
        cliente:  cliente,
        nome,
        telefone,
        regiao:   document.querySelector('[name="regiao"]').value.trim(),
        canal,
        itens,
        frete:    parseFloat(document.getElementById('input-frete')?.value) || 0,
        prazo:    document.querySelector('[name="prazo"]').value.trim(),
        obs:      document.querySelector('[name="obs"]').value.trim(),
      };

      try {
        const res  = await fetch(CONFIG.webhookUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados),
        });
        const json = await res.json();
        if (json.ok) {
          st.className = 'status ok';
          st.textContent = '✅ ' + (json.msg || 'Orçamento registrado com sucesso!');
          // Limpa form
          ['nome','telefone','regiao','prazo','obs'].forEach(n => document.querySelector(`[name="${n}"]`).value = '');
          document.querySelector('[name="data"]').valueAsDate = new Date();
          document.getElementById('canal').value = '';
          const fi = document.getElementById('input-frete'); if (fi) fi.value = '';
          document.getElementById('itens-body').innerHTML = '';
          itemCount = 0; addItem();
          recalcTotal();
        } else {
          throw new Error(json.error || 'Erro desconhecido');
        }
      } catch (err) {
        st.className = 'status err';
        st.textContent = '❌ Erro: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Registrar orçamento →';
      }
    });
  }
</script>
</body>
</html>
