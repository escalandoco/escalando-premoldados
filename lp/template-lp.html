  <style>
    /* ---- TOKENS (sobrescritos pelo CONFIG) ---- */
    :root {
      --primary:   #C4B470;
      --primary-d: #A89858;
      --dark:      #0D1117;
      --dark-2:    #161B22;
      --white:     #FFFFFF;
      --gray-50:   #F9FAFB;
      --gray-100:  #F3F4F6;
      --gray-200:  #E5E7EB;
      --gray-400:  #9CA3AF;
      --gray-600:  #4B5563;
      --gray-900:  #111827;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,0.10);
    }

    /* ---- RESET ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: var(--gray-900); background: var(--white); line-height: 1.6; }
    img { max-width: 100%; height: auto; display: block; }
    a { text-decoration: none; color: inherit; }

    /* ---- CONTAINER ---- */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* ---- HEADER ---- */
    #header {
      position: sticky; top: 0; z-index: 100;
      background: var(--dark); border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 14px 0;
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .header-logo img { height: 36px; width: auto; }
    .header-nome { font-size: 15px; font-weight: 800; color: var(--white); letter-spacing: -0.3px; }
    .header-slogan { font-size: 11px; color: var(--primary); font-weight: 500; }
    .header-cta {
      display: flex; align-items: center; gap: 10px;
    }
    .header-tel { font-size: 14px; font-weight: 700; color: var(--primary); }
    .btn-wpp-header {
      background: #25D366; color: white; padding: 9px 18px;
      border-radius: 8px; font-size: 13px; font-weight: 800;
      display: flex; align-items: center; gap: 6px; white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-wpp-header:hover { background: #1ebe5c; }
    @media (max-width: 600px) {
      .header-slogan, .header-tel { display: none; }
      .btn-wpp-header { padding: 8px 14px; font-size: 12px; }
    }

    /* ---- HERO ---- */
    #hero {
      background: var(--dark);
      padding: 80px 0 72px;
      position: relative; overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute; top: 0; right: -10%; width: 55%; height: 100%;
      background: linear-gradient(135deg, transparent 40%, rgba(196,180,112,0.06) 100%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-block; background: rgba(196,180,112,0.12); color: var(--primary);
      font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
      padding: 6px 14px; border-radius: 99px; margin-bottom: 20px;
      border: 1px solid rgba(196,180,112,0.2);
    }
    .hero-headline {
      font-size: clamp(28px, 5vw, 52px); font-weight: 900; color: var(--white);
      line-height: 1.15; letter-spacing: -0.5px; margin-bottom: 20px;
      max-width: 680px;
    }
    .hero-headline span { color: var(--primary); }
    .hero-sub {
      font-size: clamp(15px, 2.5vw, 18px); color: rgba(255,255,255,0.65);
      max-width: 560px; margin-bottom: 36px; line-height: 1.7;
    }
    .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 48px; }
    .btn-primary {
      background: var(--primary); color: var(--dark);
      padding: 15px 28px; border-radius: 10px; font-size: 15px; font-weight: 900;
      transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 14px rgba(196,180,112,0.35);
    }
    .btn-primary:hover { background: var(--primary-d); transform: translateY(-1px); }
    .btn-outline {
      background: transparent; color: var(--white);
      padding: 15px 28px; border-radius: 10px; font-size: 15px; font-weight: 700;
      border: 1.5px solid rgba(255,255,255,0.2); transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-outline:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }
    .hero-nums { display: flex; gap: 36px; flex-wrap: wrap; }
    .hero-num-item { }
    .hero-num { font-size: 28px; font-weight: 900; color: var(--primary); }
    .hero-num-label { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ---- SEÇÕES GENÉRICAS ---- */
    section { padding: 72px 0; }
    .section-label {
      font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--primary); margin-bottom: 10px;
    }
    .section-title { font-size: clamp(22px, 4vw, 36px); font-weight: 900; color: var(--gray-900); line-height: 1.2; margin-bottom: 12px; }
    .section-sub { font-size: 16px; color: var(--gray-600); max-width: 560px; line-height: 1.7; }
    .section-head { margin-bottom: 48px; }
    .section-head.center { text-align: center; }
    .section-head.center .section-sub { margin: 0 auto; }
    section.bg-dark { background: var(--dark); }
    section.bg-dark .section-title { color: var(--white); }
    section.bg-dark .section-sub { color: rgba(255,255,255,0.6); }
    section.bg-gray { background: var(--gray-50); }

    /* ---- PRODUTOS ---- */
    .produtos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
    .produto-card {
      background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-200);
      overflow: hidden; transition: box-shadow 0.2s, transform 0.2s;
    }
    .produto-card:hover { box-shadow: var(--shadow); transform: translateY(-3px); }
    .produto-img {
      width: 100%; height: 200px; background: var(--gray-100);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; color: var(--gray-400);
    }
    .produto-img img { width: 100%; height: 100%; object-fit: cover; }
    .produto-body { padding: 20px; }
    .produto-nome { font-size: 17px; font-weight: 800; color: var(--gray-900); margin-bottom: 6px; }
    .produto-aplicacao { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .produto-desc { font-size: 14px; color: var(--gray-600); line-height: 1.6; margin-bottom: 14px; }
    .produto-preco { font-size: 15px; font-weight: 800; color: var(--gray-900); }

    /* ---- DIFERENCIAIS ---- */
    .difs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; }
    .dif-card {
      background: rgba(196,180,112,0.06); border: 1px solid rgba(196,180,112,0.15);
      border-radius: var(--radius); padding: 28px 24px;
    }
    .dif-icon { font-size: 32px; margin-bottom: 14px; }
    .dif-titulo { font-size: 15px; font-weight: 800; color: var(--white); margin-bottom: 6px; }
    .dif-desc { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; }

    /* ---- DEPOIMENTOS ---- */
    .depos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
    .depo-card { background: var(--white); border-radius: var(--radius); padding: 28px; border: 1px solid var(--gray-200); }
    .depo-stars { color: #FBBF24; font-size: 16px; margin-bottom: 14px; }
    .depo-texto { font-size: 15px; color: var(--gray-600); line-height: 1.7; font-style: italic; margin-bottom: 18px; }
    .depo-autor { display: flex; align-items: center; gap: 12px; }
    .depo-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: var(--dark); flex-shrink: 0; }
    .depo-nome { font-size: 14px; font-weight: 800; color: var(--gray-900); }
    .depo-local { font-size: 12px; color: var(--gray-400); }

    /* ---- COBERTURA ---- */
    .regioes-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .regiao-tag {
      background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: 99px; padding: 8px 18px; font-size: 13px; font-weight: 600;
      color: var(--gray-700);
    }

    /* ---- FORMULÁRIO CRM ---- */
    #contato { background: var(--gray-50); }
    .form-wrap { max-width: 560px; margin: 0 auto; }
    .form-card { background: var(--white); border-radius: 16px; padding: 40px; border: 1px solid var(--gray-200); box-shadow: var(--shadow); }
    .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-field { margin-bottom: 16px; }
    .form-field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-600); margin-bottom: 6px; }
    .form-field input, .form-field select, .form-field textarea {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: 8px;
      font-size: 14px; color: var(--gray-900); background: var(--white); outline: none;
      transition: border-color 0.15s; font-family: inherit;
    }
    .form-field input:focus, .form-field select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(196,180,112,0.15); }
    .btn-form {
      width: 100%; padding: 15px; background: var(--dark); color: var(--primary);
      border: none; border-radius: 10px; font-size: 15px; font-weight: 800;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }
    .btn-form:hover { background: #1a1a2e; transform: translateY(-1px); }
    .btn-form:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .form-status { display: none; padding: 14px; border-radius: 8px; font-size: 14px; font-weight: 600; margin-top: 14px; text-align: center; }
    .form-status.ok  { background: #D1FAE5; color: #065F46; display: block; }
    .form-status.err { background: #FEE2E2; color: #7F1D1D; display: block; }
    @media (max-width: 500px) { .form-row2 { grid-template-columns: 1fr; } .form-card { padding: 24px 20px; } }

    /* ---- FOOTER ---- */
    #footer { background: var(--dark); padding: 40px 0; border-top: 1px solid rgba(255,255,255,0.06); }
    .footer-inner { display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
    .footer-logo { display: flex; align-items: center; gap: 10px; }
    .footer-logo img { height: 32px; }
    .footer-nome { font-size: 14px; font-weight: 800; color: var(--white); }
    .footer-info { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.8; text-align: right; }
    @media (max-width: 600px) { .footer-inner { flex-direction: column; align-items: flex-start; } .footer-info { text-align: left; } }

    /* ---- WhatsApp FLOAT ---- */
    .wpp-float {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      width: 56px; height: 56px; background: #25D366; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(37,211,102,0.45);
      transition: transform 0.2s; cursor: pointer;
    }
    .wpp-float:hover { transform: scale(1.1); }
    .wpp-float svg { width: 28px; height: 28px; fill: white; }

    /* ---- RESPONSIVO ---- */
    @media (max-width: 768px) {
      section { padding: 52px 0; }
      .hero-nums { gap: 24px; }
      .produtos-grid { grid-template-columns: 1fr; }
      .difs-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      #hero { padding: 52px 0 48px; }
      .hero-btns { flex-direction: column; }
      .btn-primary, .btn-outline { justify-content: center; }
      .difs-grid { grid-template-columns: 1fr; }
      .depos-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    <div class="depos-grid" id="depos-grid"></div>
  </div>
</section>

<!-- COBERTURA -->
<section id="sec-cobertura" class="bg-gray">
  <div class="container">
    <div class="section-head">
      <div class="section-label">Atendimento</div>
      <h2 class="section-title">Regiões que atendemos</h2>
      <p class="section-sub" id="cob-cidade"></p>
    </div>
    <div class="regioes-list" id="regioes-list"></div>
  </div>
</section>

<!-- FORMULÁRIO CRM -->
<section id="contato">
  <div class="container">
    <div class="section-head center">
      <div class="section-label">Contato</div>
      <h2 class="section-title">Solicite seu orçamento</h2>
      <p class="section-sub">Preencha abaixo e entraremos em contato rapidamente.</p>
    </div>
    <div class="form-wrap">
      <div class="form-card">
        <div class="form-row2">
          <div class="form-field"><label>Seu nome *</label><input type="text" id="f-nome" placeholder="Nome completo"></div>
          <div class="form-field"><label>WhatsApp *</label><input type="tel" id="f-tel" placeholder="(00) 00000-0000"></div>
        </div>
        <div class="form-row2">
          <div class="form-field"><label>Produto de interesse</label><input type="text" id="f-produto" placeholder="Ex: Mourão torneado"></div>
          <div class="form-field"><label>Sua cidade</label><input type="text" id="f-cidade" placeholder="Ex: Aracaju — SE"></div>
        </div>
        <div class="form-field"><label>Mensagem (opcional)</label><input type="text" id="f-obs" placeholder="Quantidade, tamanho, prazo..."></div>
        <!-- UTM hidden fields — preenchidos via JS -->
        <input type="hidden" id="utm-source"   name="utm_source">
        <input type="hidden" id="utm-medium"   name="utm_medium">
        <input type="hidden" id="utm-campaign" name="utm_campaign">
        <input type="hidden" id="utm-content"  name="utm_content">
        <input type="hidden" id="utm-term"     name="utm_term">
        <button class="btn-form" id="btn-form">Solicitar orçamento grátis →</button>
        <div class="form-status" id="form-status"></div>
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer id="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-logo">
        <img id="f-logo" src="" alt="" loading="lazy">
        <div class="footer-nome" id="f-nome-footer"></div>
      </div>
      <div class="footer-info" id="f-info"></div>
    </div>
  </div>
</footer>

<!-- WhatsApp Float -->
<a class="wpp-float" id="wpp-float" href="#" target="_blank" rel="noopener" title="Falar no WhatsApp">
  <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<script>
(function() {
  // ---- Aplica CSS vars de cor ----
  document.documentElement.style.setProperty('--primary',   CONFIG.cor_primaria   || '#C4B470');
  document.documentElement.style.setProperty('--primary-d', CONFIG.cor_primaria   || '#A89858');
  document.documentElement.style.setProperty('--dark',      CONFIG.cor_secundaria || '#0D1117');
  document.documentElement.style.setProperty('--dark-2',    CONFIG.cor_secundaria || '#161B22');

  // ---- Meta ----
  document.getElementById('page-title').textContent = CONFIG.empresa + ' — ' + (CONFIG.slogan || 'Premoldados');
  document.getElementById('page-desc').content = CONFIG.subheadline || '';

  // ---- WPP link ----
  const wppUrl = `https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(CONFIG.whatsapp_msg || '')}`;

  // ---- Header ----
  const logo = document.getElementById('h-logo');
  logo.src = CONFIG.logo || ''; logo.alt = CONFIG.empresa;
  document.getElementById('h-nome').textContent    = CONFIG.empresa;
  document.getElementById('h-slogan').textContent  = CONFIG.slogan || '';
  document.getElementById('h-tel').textContent     = CONFIG.telefone || '';
  document.getElementById('h-wpp').href            = wppUrl;

  // ---- Hero ----
  document.getElementById('hero-badge').textContent    = CONFIG.badge || CONFIG.empresa;
  document.getElementById('hero-headline').innerHTML   = CONFIG.headline || '';
  document.getElementById('hero-sub').textContent      = CONFIG.subheadline || '';
  document.getElementById('hero-wpp').href             = wppUrl;

  const numsEl = document.getElementById('hero-nums');
  (CONFIG.numeros || []).forEach(n => {
    numsEl.innerHTML += `<div class="hero-num-item"><div class="hero-num">${n.valor}</div><div class="hero-num-label">${n.label}</div></div>`;
  });

  // ---- Produtos ----
  const grid = document.getElementById('produtos-grid');
  document.getElementById('prod-sub').textContent = `Fabricamos com qualidade para ${CONFIG.cidade || 'sua região'}.`;
  (CONFIG.produtos || []).forEach(p => {
    grid.innerHTML += `
      <div class="produto-card">
        <div class="produto-img">${p.foto ? `<img src="${p.foto}" alt="${p.nome}" loading="lazy">` : '🧱'}</div>
        <div class="produto-body">
          ${p.aplicacao ? `<div class="produto-aplicacao">${p.aplicacao}</div>` : ''}
          <div class="produto-nome">${p.nome}</div>
          ${p.desc  ? `<div class="produto-desc">${p.desc}</div>` : ''}
          ${p.preco ? `<div class="produto-preco">${p.preco}</div>` : ''}
        </div>
      </div>`;
  });

  // ---- Diferenciais ----
  const difsGrid = document.getElementById('difs-grid');
  (CONFIG.diferenciais || []).forEach(d => {
    difsGrid.innerHTML += `
      <div class="dif-card">
        <div class="dif-icon">${d.icone || '✓'}</div>
        <div class="dif-titulo">${d.titulo}</div>
        ${d.desc ? `<div class="dif-desc">${d.desc}</div>` : ''}
      </div>`;
  });

  // ---- Depoimentos ----
  const deposGrid = document.getElementById('depos-grid');
  (CONFIG.depoimentos || []).forEach(d => {
    const inicial = (d.nome || '?')[0].toUpperCase();
    deposGrid.innerHTML += `
      <div class="depo-card">
        <div class="depo-stars">★★★★★</div>
        <p class="depo-texto">"${d.texto}"</p>
        <div class="depo-autor">
          <div class="depo-avatar">${inicial}</div>
          <div>
            <div class="depo-nome">${d.nome}</div>
            ${d.local ? `<div class="depo-local">${d.local}</div>` : ''}
          </div>
        </div>
      </div>`;
  });

  // ---- Cobertura ----
  document.getElementById('cob-cidade').textContent = `Sediados em ${CONFIG.cidade || ''}. Entregamos para:`;
  const regEl = document.getElementById('regioes-list');
  (CONFIG.regioes || []).forEach(r => { regEl.innerHTML += `<span class="regiao-tag">📍 ${r}</span>`; });

  // ---- Footer ----
  const fLogo = document.getElementById('f-logo');
  fLogo.src = CONFIG.logo || ''; fLogo.alt = CONFIG.empresa;
  document.getElementById('f-nome-footer').textContent = CONFIG.empresa;
  document.getElementById('f-info').innerHTML = [
    CONFIG.telefone && `📞 ${CONFIG.telefone}`,
    CONFIG.cidade   && `📍 ${CONFIG.cidade}`,
    CONFIG.endereco && CONFIG.endereco,
    `© ${new Date().getFullYear()} ${CONFIG.empresa}`,
  ].filter(Boolean).join('<br>');

  // ---- WhatsApp float ----
  document.getElementById('wpp-float').href = wppUrl;

  // ---- Rastreamento Meta ----
  const CAPI_ENDPOINT = 'https://escalando-premoldados.vercel.app/api/events';

  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : '';
  }

  function genEventId(name) {
    return name + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  }

  function sendCAPI(eventName, eventId, extraUserData) {
    if (!CONFIG.pixel_meta) return;
    const payload = {
      event_name:       eventName,
      event_id:         eventId,
      pixel_id:         CONFIG.pixel_meta,
      event_source_url: window.location.href,
      user_data: {
        fbc: getCookie('_fbc'),
        fbp: getCookie('_fbp'),
        ...extraUserData,
      },
    };
    fetch(CAPI_ENDPOINT, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    }).catch(() => {}); // silencia erros de rede — não interrompe o usuário
  }

  // Dispara Contact no clique de qualquer botão WhatsApp
  function trackWppClick() {
    const eid = genEventId('Contact');
    if (typeof fbq !== 'undefined') fbq('track', 'Contact', {}, { eventID: eid });
    if (typeof gtag !== 'undefined') gtag('event', 'click_whatsapp');
    sendCAPI('Contact', eid, {});
  }

  ['h-wpp', 'hero-wpp', 'wpp-float'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('click', trackWppClick);
  });

  // ---- UTM — popula campos hidden ao carregar ----
  (function() {
    const utm = new URLSearchParams(window.location.search);
    ['source','medium','campaign','content','term'].forEach(p => {
      const el = document.getElementById('utm-' + p);
      if (el) el.value = utm.get('utm_' + p) || '';
    });
  })();

  // ---- Formulário ----
  const fTel = document.getElementById('f-tel');
  fTel.addEventListener('input', function(e) {
    let v = e.target.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 6) v = v.replace(/^(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
    else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
    e.target.value = v;
  });

  document.getElementById('btn-form').addEventListener('click', async function() {
    const btn  = this;
    const st   = document.getElementById('form-status');
    const nome = document.getElementById('f-nome').value.trim();
    const tel  = document.getElementById('f-tel').value.trim();

    if (!nome || !tel) {
      st.className = 'form-status err'; st.textContent = '❌ Preencha nome e WhatsApp.'; return;
    }

    st.className = 'form-status'; st.textContent = '';
    btn.disabled = true; btn.textContent = 'Enviando...';

    // UTM — captura os 5 parâmetros dos campos hidden (populados no load)
    const canal = document.getElementById('utm-source').value
      ? `Site — ${document.getElementById('utm-source').value}`
      : 'Site';

    try {
      const res = await fetch(CONFIG.webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action:        'novo-lead',
          empresa:       CONFIG.empresa,
          nome,
          telefone:      tel,
          cidade:        document.getElementById('f-cidade').value.trim(),
          canal,
          produto:       document.getElementById('f-produto').value.trim(),
          obs:           document.getElementById('f-obs').value.trim(),
          utm_source:    document.getElementById('utm-source').value,
          utm_medium:    document.getElementById('utm-medium').value,
          utm_campaign:  document.getElementById('utm-campaign').value,
          utm_content:   document.getElementById('utm-content').value,
          utm_term:      document.getElementById('utm-term').value,
        }),
      });
      const json = await res.json();
      if (json.success) {
        st.className = 'form-status ok';
        st.textContent = '✅ Recebido! Entraremos em contato em breve.';
        ['f-nome','f-tel','f-produto','f-cidade','f-obs'].forEach(id => document.getElementById(id).value = '');
        btn.textContent = 'Enviado!';
        // Pixel evento Lead (browser + CAPI deduplicado)
        const leadEid = genEventId('Lead');
        const tel = document.getElementById('f-tel').value.trim();
        if (typeof fbq !== 'undefined') fbq('track', 'Lead', {}, { eventID: leadEid });
        if (typeof gtag !== 'undefined') gtag('event', 'generate_lead');
        sendCAPI('Lead', leadEid, { ph: tel });
      } else throw new Error(json.error);
    } catch (err) {
      st.className = 'form-status err';
      st.textContent = '❌ Erro ao enviar. Tente pelo WhatsApp.';
      btn.disabled = false; btn.textContent = 'Solicitar orçamento grátis →';
    }
  });
})();
</script>

</body>
</html>
