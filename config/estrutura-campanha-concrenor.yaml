# Estrutura de Campanha — Concrenor
# Story: EP4-S5
# Criado: 2026-03-06

cliente: Concrenor
angulo_principal: "Economia de longo prazo vs mourão de madeira"
ideia_central: "O mourão de concreto parece mais caro — mas custa 10x menos ao longo da vida"

abordagens:
  - id: A1
    nome: "Dor financeira"
    descricao: "Quanto você gasta por ano repondo mourão podre?"
    hook: "Você sabia que mourão de madeira custa R$8.000/ano para 100 hectares?"

  - id: A2
    nome: "Geração"
    descricao: "Cerca que seu filho vai herdar. Sem manutenção."
    hook: "Meu pai instalou essa cerca em 1995. Eu nunca troquei um mourão."

  - id: A3
    nome: "Prova social"
    descricao: "Antônio Mendes: 8 anos de cerca sem trocar um mourão"
    hook: "8 anos, 300 hectares, zero reposição. Isso é mourão Concrenor."

